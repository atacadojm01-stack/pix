<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGT Pix PRO - Atacado JM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --success: #22c55e;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ESTRUTURA BASE (Focada no Desktop primeiro) */
        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* Coluna da Esquerda: Formulário e Infos */
        .panel-left {
            flex: 1.2;
            padding: 45px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Coluna da Direita: QR Code */
        .panel-right {
            flex: 1;
            padding: 45px;
            background: rgba(15, 23, 42, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .modal-content {
            width: 100%;
            text-align: center;
        }

        .brand-header {
            margin-bottom: 35px;
        }

        .brand-header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-header h1 span {
            color: var(--accent);
        }

        .brand-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 35px;
        }

        /* CARD DE INFORMAÇÃO: Desktop empilhado em colunas */
        .info-card {
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column; 
            justify-content: center;
        }

        .info-card.full-width {
            grid-column: span 2;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        .info-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .price-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 20px;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .price-input {
            width: 100%;
            padding: 18px 20px 18px 60px;
            font-size: 28px;
            font-weight: 700;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            color: #ffffff;
            outline: none;
            transition: all 0.25s ease;
        }

        .price-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
            background: rgba(51, 65, 85, 0.8);
        }

        .actions-vertical {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-generate {
            width: 100%;
            background-color: var(--accent);
            color: var(--bg-main);
            border: none;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.25);
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .btn-reset {
            width: 100%;
            background-color: transparent;
            color: var(--text-muted);
            border: 2px dashed var(--border-color);
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-reset:active {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* ESTILOS DO QR CODE */
        .live-value-tag {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .live-value-tag.free {
            font-size: 20px;
            color: var(--success);
        }

        .qr-wrapper {
            display: inline-block;
            padding: 12px; 
            background: #ffffff;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            /* Estas duas linhas removem o espaço fantasma em baixo da imagem */
            line-height: 0;
            font-size: 0;
        }

        /* QR code ampliado para 250px */
        .qr-wrapper img {
            margin: 0 auto;
            width: 250px;
            height: 250px;
        }

        .btn-copy {
            width: 100%;
            background-color: rgba(51, 65, 85, 0.6);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-copy.success {
            background-color: var(--success);
            color: #ffffff;
            border-color: var(--success);
        }

        /* Botão fechar só aparece no celular */
        .btn-close {
            display: none;
            width: 100%;
            background-color: transparent;
            color: var(--text-muted);
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Ocultar setas do input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* =========================================
           ADAPTAÇÃO PARA CELULAR (MODAL E LINHAS)
           ========================================= */
        @media (max-width: 850px) {
            body {
                padding: 20px;
            }

            .container {
                max-width: 500px;
                flex-direction: column;
                background: transparent;
                box-shadow: none;
                border: none;
            }

            .panel-left {
                background: var(--bg-card);
                border-radius: 24px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                border: 1px solid var(--border-color);
                padding: 35px 25px;
            }

            .brand-header h1 { font-size: 28px; justify-content: center; }
            .brand-header { text-align: center; }
            
            .info-grid { grid-template-columns: 1fr; gap: 12px; }
            
            /* Retorna os cards para layout lado a lado no celular */
            .info-card { 
                display: flex; 
                flex-direction: row; 
                justify-content: space-between; 
                align-items: center; 
            }
            .info-label { margin-bottom: 0; }
            
            .info-card.full-width { grid-column: span 1; }
            .input-group label { text-align: center; }

            /* Transforma o Painel Direito em Popup Modal */
            .panel-right {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(8px);
                z-index: 9999;
                padding: 20px;
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .panel-right.active {
                opacity: 1;
                visibility: visible;
            }

            .modal-content {
                background: var(--bg-card);
                max-width: 400px;
                padding: 35px 25px;
                border-radius: 24px;
                border: 1px solid var(--border-color);
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
                transform: translateY(30px) scale(0.95);
                transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            }

            .panel-right.active .modal-content {
                transform: translateY(0) scale(1);
            }

            .btn-close {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel-left">
            <div class="brand-header">
                <h1>Atacado <span>JM</span></h1>
                <p>Terminal de Recebimento Instantâneo Pix</p>
            </div>

            <div class="info-grid">
                <div class="info-card full-width">
                    <span class="info-label">Beneficiário</span>
                    <span class="info-value">Atacado JM</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Chave Celular</span>
                    <span class="info-value">(94) 99151-3651</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Cidade</span>
                    <span class="info-value">Floresta do Araguaia</span>
                </div>
            </div>

            <div class="input-group">
                <label for="valor">Insira o valor da cobrança:</label>
                <div class="price-input-wrapper">
                    <span class="currency-symbol">R$</span>
                    <input type="number" id="valor" class="price-input" step="0.01" placeholder="0,00" min="0.01" autofocus autocomplete="off">
                </div>
            </div>

            <div class="actions-vertical">
                <button class="btn-generate" onclick="gerarCobranca(false)">Gerar Código com Valor</button>
                <button class="btn-reset" onclick="resetarParaPadrao()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    Gerar Pix Livre (Cliente digita)
                </button>
            </div>
        </div>

        <div class="panel-right" id="qrModal">
            <div class="modal-content">
                <div class="live-value-tag" id="valorTag">Valor Livre</div>
                
                <div class="qr-wrapper" id="qrcode"></div>
                
                <button class="btn-copy" id="btnCopiar" onclick="copiarCodigo()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span id="txtBotao">Copiar Linha Digitável</span>
                </button>

                <button class="btn-close" onclick="fecharModal()">Voltar / Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // Parâmetros estáticos da conta
        const CHAVE_PIX = "+5594991513651"; 
        const NOME_RECEBEDOR = "Atacado JM";
        const CIDADE_RECEBEDOR = "Floresta Aragua"; 
        
        let stringPixGerada = "";
        let qrCodeInstancia = null;

        // Controle do Popup (Ativado apenas em telas menores)
        function abrirModal() {
            document.getElementById('qrModal').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('qrModal').classList.remove('active');
        }

        // Gerador matemático obrigatório de Checksum CRC16
        function calcularCRC16(str) {
            let crc = 0xFFFF;
            for (let c = 0; c < str.length; c++) {
                crc ^= str.charCodeAt(c) << 8;
                for (let i = 0; i < 8; i++) {
                    if (crc & 0x8000) crc = (crc << 1) ^ 0x1021;
                    else crc = crc << 1;
                }
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        }

        function formatarCampo(id, valor) {
            const tamanho = valor.length.toString().padStart(2, '0');
            return `${id}${tamanho}${valor}`;
        }

        function gerarCobranca(isLivre = false) {
            let valorCampo = "";
            const valorInput = document.getElementById('valor').value;
            const valorTag = document.getElementById('valorTag');

            // Configuração do modo livre ou com valor
            if (isLivre) {
                valorTag.innerText = "Chave Pix (94) 99151-3651";
                valorTag.classList.add('free');
            } else {
                if (!valorInput || parseFloat(valorInput) <= 0) {
                    alert("Por favor, digite um valor válido.");
                    return;
                }
                const valorFormatado = parseFloat(valorInput).toFixed(2);
                valorCampo = formatarCampo("54", valorFormatado);
                
                valorTag.innerText = "R$ " + parseFloat(valorInput).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                valorTag.classList.remove('free');
            }

            // Montagem do Payload (Padrão BC)
            const payloadFormat = "000201";
            const contaInfo = formatarCampo("00", "br.gov.bcb.pix") + formatarCampo("01", CHAVE_PIX);
            const merchantAccount = formatarCampo("26", contaInfo);
            const mcc = "52040000"; 
            const moeda = "5303986"; 
            const pais = "5802BR";
            const nome = formatarCampo("59", NOME_RECEBEDOR);
            const city = formatarCampo("60", CIDADE_RECEBEDOR);
            const txid = formatarCampo("62", formatarCampo("05", "***")); 

            let payloadCompleto = payloadFormat + merchantAccount + mcc + moeda + valorCampo + pais + nome + city + txid;
            payloadCompleto += "6304";
            payloadCompleto += calcularCRC16(payloadCompleto);
            
            stringPixGerada = payloadCompleto;

            // Renderização do QR Code
            const containerQr = document.getElementById('qrcode');
            containerQr.innerHTML = ""; 

            // QR Code configurado para 250px
            qrCodeInstancia = new QRCode(containerQr, {
                text: stringPixGerada,
                width: 250,
                height: 250,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });

            // Reseta botão de cópia
            const btn = document.getElementById('btnCopiar');
            const txt = document.getElementById('txtBotao');
            btn.classList.remove('success');
            txt.innerText = "Copiar Linha Digitável";
            
            // Ativa o modal (No desktop isso não afeta visualmente, no celular sobe o popup)
            abrirModal();
        }

        // Função de Reset
        function resetarParaPadrao() {
            document.getElementById('valor').value = "";
            gerarCobranca(true);
        }

        // Sistema de Cópia
        function copiarCodigo() {
            if (!stringPixGerada) return;

            navigator.clipboard.writeText(stringPixGerada).then(() => {
                const btn = document.getElementById('btnCopiar');
                const txt = document.getElementById('txtBotao');
                
                btn.classList.add('success');
                txt.innerText = "Copiado com Sucesso!";
                
                setTimeout(() => {
                    btn.classList.remove('success');
                    txt.innerText = "Copiar Linha Digitável";
                }, 2000);
            }).catch(err => {
                alert("Falha ao copiar. O seu navegador pode ter bloqueado.");
            });
        }

        // Permite gerar usando a tecla Enter do teclado do PC ou Celular
        document.getElementById('valor').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('valor').blur(); // Esconde o teclado virtual no celular
                gerarCobranca(false);
            }
        });

        // Inicializa a página mostrando por padrão o QR Code estático (Valor Livre)
        window.onload = function() {
            gerarCobranca(true);
        };
    </script>
</body>
</html>
